name: FEMA CICD Pipeline

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'README.md'
      - 'images/**'


env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }} 

  TF_VAR_aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
  TF_VAR_aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

  TF_VAR_db_username: ${{ secrets.DB_USERNAME }}
  TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
  
  
jobs:
  # -----------------------------------------------------
  # STAGE 1: CODE VALIDATION (CI)
  # -----------------------------------------------------
  code-validation:
    name: "Linting & Validation"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # Python Linting
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Flake8 Check
        run: |
          pip install flake8
          flake8 scripts/ --max-line-length=200 --ignore=E203,W503,E128,E124,E305,W291,W391,E302,E303,W293,F403,F405,W292,E127,E131

      # Terraform Validation
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Check
        run: |
          cd terraform
          terraform init
          terraform validate
          terraform plan -out=tfplan

  # -----------------------------------------------------
  # STAGE 2: INFRASTRUCTURE DEPLOYMENT (CD - TERRAFORM)
  # -----------------------------------------------------
  deploy-infra:
    name: "Terraform Deploy"
    runs-on: ubuntu-latest
    needs: code-validation 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Terraform 
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve

  # -----------------------------------------------------
  # STAGE 3: APPLICATION & JOB DEPLOYMENT (CD - DABs)
  # -----------------------------------------------------
  deploy-app:
    name: "Databricks Asset Bundle Deploy (DABs)"
    runs-on: ubuntu-latest
    needs: deploy-infra 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@main

      - name: Databricks Bundle Deploy
        env:
          BUNDLE_VAR_aws_access_key_id: ${{ env.AWS_ACCESS_KEY_ID }}
          BUNDLE_VAR_aws_secret_access_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          BUNDLE_VAR_s3_bucket_name: ${{ env.S3_BUCKET_NAME }}
        run: |
          databricks bundle deploy --target production