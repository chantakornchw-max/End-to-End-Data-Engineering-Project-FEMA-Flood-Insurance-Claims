bundle:
  name: fema_pipeline

variables:
  aws_access_key_id:
    description: "AWS Access Key"
  aws_secret_access_key:
    description: "AWS Secret Key"
  s3_bucket_name:
    description: "S3 Bucket Name"

workspace:
  root_path: /Workspace/Shared/FEMA_Project/.bundle

environments:
  production:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}

resources:
  jobs:
    fema_pipeline:
      name: "FEMA End-to-End Data Pipeline (Medallion Architecture)"
      schedule:
        quartz_cron_expression: "0 0 14 * * ?" 
        timezone_id: "Asia/Bangkok"
        pause_status: PAUSED

      environments:
        - environment_key: serverless_env
          spec:
            client: "1"

      tasks:
        - task_key: ingest_from_rds_to_s3
          environment_key: serverless_env 
          spark_python_task:
            python_file: "scripts/ingest_from_rds_to_s3.py"
            parameters:
              - ${var.aws_access_key_id}
              - ${var.aws_secret_access_key}
              - ${var.s3_bucket_name}

        - task_key: cleaned_bronze_to_silver
          depends_on:
            - task_key: ingest_from_rds_to_s3
          environment_key: serverless_env 
          spark_python_task:
            python_file: "scripts/cleaned_bronze_to_silver.py"
            parameters:
              - ${var.aws_access_key_id}
              - ${var.aws_secret_access_key}
              - ${var.s3_bucket_name}

        - task_key: fact_silver_to_gold
          depends_on:
            - task_key: cleaned_bronze_to_silver
          environment_key: serverless_env 
          spark_python_task:
            python_file: "scripts/fact_silver_to_gold.py"
            parameters:
              - ${var.aws_access_key_id}
              - ${var.aws_secret_access_key}
              - ${var.s3_bucket_name}

        - task_key: create_dimension_tables
          environment_key: serverless_env 
          spark_python_task:
            python_file: "scripts/create_dimension_tables.py"
            parameters:
              - ${var.aws_access_key_id}
              - ${var.aws_secret_access_key}
              - ${var.s3_bucket_name}